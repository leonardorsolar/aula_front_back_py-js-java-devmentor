<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevStore | Produtos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            background: #eaeded;
            color: #0F1111;
        }

        /* Header */
        .site-header {
            position: sticky;
            top: 0;
            z-index: 200;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }

        .top-header {
            background: #131921;
            color: white;
            padding: 32px 32px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 14px;
        }

        .logo {
            font-size: 1.9rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
            line-height: 1;
            letter-spacing: -0.03em;
            white-space: nowrap;
        }

        .logo small {
            font-size: 0.95rem;
            font-weight: 600;
            margin-left: 2px;
        }

        .search-bar {
            display: flex;
            min-width: 240px;
        }

        .search-select {
            border: none;
            background: #f3f3f3;
            color: #3a3a3a;
            padding: 0 10px;
            border-radius: 8px 0 0 8px;
            font-size: 0.82rem;
            outline: none;
        }

        .search-bar input {
            flex: 1;
            padding: 10px 12px;
            border: none;
            outline: none;
            font-size: 0.95rem;
        }

        .search-bar button {
            background: #febd69;
            border: none;
            padding: 0 14px;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            font-size: 1.05rem;
        }

        .search-bar button:hover {
            background: #f3a847;
        }

        .header-right {
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .header-chip {
            font-size: 0.78rem;
            line-height: 1.2;
            color: #e3e6e6;
            white-space: nowrap;
        }

        .header-chip strong {
            font-size: 0.92rem;
            color: white;
        }

        .cart-btn {
            background: transparent;
            border: 1px solid transparent;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.95rem;
            padding: 6px 8px;
            border-radius: 6px;
            font-weight: 700;
        }

        .cart-btn:hover {
            border-color: rgba(255,255,255,0.45);
        }

        .cart-btn i { font-size: 1.35rem; }

        .sub-header {
            background: #232f3e;
            color: white;
            padding: 15px 16px;
            display: flex;
            align-items: center;
            gap: 18px;
            overflow-x: auto;
            scrollbar-width: thin;
        }

        .menu-item {
            color: #f3f3f3;
            text-decoration: none;
            font-size: 0.93rem;
            white-space: nowrap;
            font-weight: 500;
        }

        .menu-item:hover {
            text-decoration: underline;
        }

        #cart-count {
            color: #f08804;
            font-weight: bold;
        }

        .backend-switcher {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            display: flex;
            padding: 4px;
            gap: 4px;
        }

        .backend-btn {
            background: transparent;
            color: white;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.8rem;
            border-radius: 4px;
            transition: all 0.3s;
            font-weight: 500;
        }

        .backend-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .backend-btn.active {
            background: #febd69;
            color: #0F1111;
        }

        @media (max-width: 980px) {
            .top-header {
                grid-template-columns: 1fr;
            }

            .header-right {
                justify-content: space-between;
            }

            .logo {
                font-size: 1.6rem;
            }

            .backend-switcher {
                order: -1;
                width: 100%;
                justify-content: center;
            }
        }

        /* Main Content */
        main {
            max-width: 1500px;
            margin: 0 auto;
            padding: 20px;
        }

        .page-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        /* Product Card - Amazon Style */
        .product-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            transition: box-shadow 0.2s;
            cursor: pointer;
        }

        .product-card:hover {
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: contain;
            margin-bottom: 12px;
        }

        .product-title {
            font-size: 1rem;
            line-height: 1.3;
            margin-bottom: 4px;
            color: #0F1111;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-rating {
            color: #ffa41c;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .product-rating span {
            color: #007185;
            margin-left: 4px;
        }

        .product-price {
            font-size: 1.4rem;
            font-weight: 700;
            color: #0F1111;
            margin: 8px 0;
        }

        .product-price small {
            font-size: 0.8rem;
            font-weight: 400;
        }

        .prime-badge {
            color: #00a8e1;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .prime-badge i {
            color: #ffa41c;
            margin-right: 2px;
        }

        .delivery-info {
            font-size: 0.85rem;
            color: #565959;
            margin-bottom: 12px;
        }

        .btn-add {
            background: #ffd814;
            border: 1px solid #fcd200;
            border-radius: 20px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.85rem;
            width: 100%;
            margin-top: auto;
        }

        .btn-add:hover {
            background: #f7ca00;
        }

        .btn-add.added {
            background: #90ee90;
            border-color: #2e7d32;
        }

        /* Cart Modal */
        #cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .cart-content {
            background: white;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
        }

        .cart-header {
            padding: 16px 20px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h2 {
            font-size: 1.3rem;
            font-weight: 500;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #565959;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .cart-item {
            display: flex;
            gap: 16px;
            padding: 12px 0;
            border-bottom: 1px solid #ddd;
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-title {
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .cart-item-price {
            font-weight: 700;
            color: #B12704;
        }

        .remove-item {
            background: none;
            border: none;
            color: #007185;
            cursor: pointer;
            font-size: 0.85rem;
            text-decoration: underline;
        }

        .cart-footer {
            padding: 16px 20px;
            border-top: 1px solid #ddd;
        }

        .cart-total {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 12px;
            text-align: right;
        }

        .btn-checkout {
            background: #ffd814;
            border: 1px solid #fcd200;
            border-radius: 8px;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .empty-cart {
            text-align: center;
            padding: 40px;
            color: #565959;
        }

        /* Loading */
        .loading {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .skeleton {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            animation: pulse 1.5s infinite;
        }

        .skeleton-img {
            height: 200px;
            background: #f0f0f0;
            margin-bottom: 12px;
        }

        .skeleton-line {
            height: 16px;
            background: #f0f0f0;
            margin-bottom: 8px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Success */
        .success-screen {
            text-align: center;
            padding: 60px 20px;
            background: white;
            max-width: 500px;
            margin: 100px auto;
            border-radius: 8px;
        }

        .success-screen h2 {
            color: #007600;
            font-size: 1.8rem;
            margin-bottom: 16px;
        }

        .btn-back {
            background: #ffd814;
            border: 1px solid #fcd200;
            border-radius: 8px;
            padding: 12px 24px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="top-header">
            <a href="#" class="logo" onclick="location.reload()">produtos<small>.com.br</small></a>
            <div class="search-bar">
                <select class="search-select" aria-label="Categoria da busca">
                    <option>Todos</option>
                    <option>Eletrônicos</option>
                    <option>Computadores</option>
                    <option>Acessórios</option>
                </select>
                <input type="text" placeholder="Buscar produtos...">
                <button aria-label="Buscar"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
            <div class="header-right">
                
                <div class="header-chip">Olá, faça seu login<br><strong>Contas e Listas</strong></div>
                <button class="cart-btn" onclick="toggleCart()">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span id="cart-count">0</span>
                    Carrinho
                </button>
            </div>
        </div>

        <nav class="sub-header" aria-label="Menu principal">
            <a class="menu-item" href="#">Todos</a>
            <a class="menu-item" href="#">Ofertas do Dia</a>
            <a class="menu-item" href="#">Mais Vendidos</a>
            <a class="menu-item" href="#">Games</a>
            <a class="menu-item" href="#">Eletrônicos</a>
            <a class="menu-item" href="#">Prime</a>
                <div class="backend-switcher" style="margin-left: auto;">
                    
                    <button class="backend-btn" data-backend="node" onclick="switchBackend('node')">Node.js</button>
                    <button class="backend-btn" data-backend="python" onclick="switchBackend('python')">Python</button>
                    <button class="backend-btn" data-backend="java" onclick="switchBackend('java')">Java</button>
                </div>
        </nav>
    </header>

    <main id="main-content">
        <h1 class="page-title">Resultados</h1>
        <div id="products-container">
            <div class="loading">
                ${[1,2,3,4].map(() => `
                    <div class="skeleton">
                        <div class="skeleton-img"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line" style="width: 60%"></div>
                    </div>
                `).join('')}
            </div>
        </div>
    </main>

    <div id="cart-modal">
        <div class="cart-content">
            <div class="cart-header">
                <h2>Carrinho de Compras</h2>
                <button class="close-btn" onclick="toggleCart()">×</button>
            </div>
            <div id="cart-items" class="cart-items"></div>
            <div class="cart-footer">
                <div class="cart-total" id="cart-total">Total: R$ 0,00</div>
                <button class="btn-checkout" onclick="checkout()">Finalizar Compra</button>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URLS = {
            node: 'http://localhost:3000',
            java: 'http://localhost:8080/api',
            python: 'http://localhost:4000'
        };

        let currentBackend = localStorage.getItem('backend') || 'mock';
        let API_URL = BACKEND_URLS[currentBackend] || null;
        let cart = [];

        function switchBackend(backend) {
            localStorage.setItem('backend', backend);
            currentBackend = backend;
            API_URL = BACKEND_URLS[backend] || null;
            
            document.querySelectorAll('.backend-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-backend="${backend}"]`).classList.add('active');
            
            fetchProducts();
        }

        function initBackend() {
            const backend = localStorage.getItem('backend') || 'mock';
            currentBackend = backend;
            API_URL = BACKEND_URLS[backend] || null;
            document.querySelector(`[data-backend="${backend}"]`).classList.add('active');
            document.querySelectorAll('.backend-btn').forEach(btn => {
                if (btn.dataset.backend !== backend) btn.classList.remove('active');
            });
        }

        const fallbackImages = [
            "https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?w=600",
            "https://images.unsplash.com/photo-1547082299-de196ea013d6?w=600",
            "https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?w=600",
            "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600"
        ];

        async function fetchProducts() {
            if (currentBackend === 'mock' || !API_URL) {
                renderMockProducts();
                return;
            }

            try {
                const response = await fetch(`${API_URL}/products`);
                if (!response.ok) throw new Error('Erro ao carregar produtos');
                const products = await response.json();
                renderProducts(products);
            } catch (error) {
                renderMockProducts();
            }
        }

        function renderMockProducts() {
            const mock = [
                { id: 1, name: 'Teclado Mecânico RGB', price: 349.90 },
                { id: 2, name: 'Monitor 4K UltraWide 32"', price: 2199.00 },
                { id: 3, name: 'SSD NVMe 1TB', price: 499.90 },
                { id: 4, name: 'Fone Noise Cancelling', price: 899.00 },
            ];
            renderProducts(mock);
        }

        function renderProducts(products) {
            const container = document.getElementById('products-container');
            container.innerHTML = `<div class="products-grid">` +
                products.map((product, index) => {
                    const img = product.image_url || fallbackImages[index % fallbackImages.length];
                    const rating = (4 + Math.random()).toFixed(1);
                    const reviews = Math.floor(Math.random() * 1000) + 50;
                    return `
                    <div class="product-card">
                        <img class="product-image" src="${img}" alt="${product.name}" loading="lazy">
                        <h3 class="product-title">${product.name}</h3>
                        <div class="product-rating">
                            ${'★'.repeat(4)}<span>(${reviews})</span>
                        </div>
                        <div class="product-price">
                            <small>R$</small> ${product.price.toFixed(2).replace('.', ',')}
                        </div>
                        <div class="prime-badge">
                            <i class="fa-solid fa-check"></i> prime
                        </div>
                        <div class="delivery-info">
                            Entrega GRÁTIS amanhã
                        </div>
                        <button class="btn-add" onclick="addToCart(${product.id}, '${product.name}', ${product.price}, '${img}', this)">
                            Adicionar ao carrinho
                        </button>
                    </div>
                `}).join('') + `</div>`;
        }

        function addToCart(id, name, price, image, btn) {
            cart.push({ id, name, price, image });
            updateCartUI();
            
            btn.classList.add('added');
            btn.textContent = 'Adicionado ✓';
            setTimeout(() => {
                btn.classList.remove('added');
                btn.textContent = 'Adicionar ao carrinho';
            }, 1500);
        }

        function updateCartUI() {
            document.getElementById('cart-count').textContent = cart.length;
            
            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                container.innerHTML = '<div class="empty-cart">Seu carrinho está vazio</div>';
            } else {
                container.innerHTML = cart.map((item, i) => `
                    <div class="cart-item">
                        <img src="${item.image}" alt="${item.name}">
                        <div class="cart-item-info">
                            <div class="cart-item-title">${item.name}</div>
                            <div class="cart-item-price">R$ ${item.price.toFixed(2).replace('.', ',')}</div>
                            <button class="remove-item" onclick="removeItem(${i})">Excluir</button>
                        </div>
                    </div>
                `).join('');
            }
            
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-total').textContent = `Total: R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        function removeItem(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
            if (modal.style.display === 'flex') updateCartUI();
        }

        async function checkout() {
            if (cart.length === 0) return;
            const orderData = { total: cart.reduce((s, i) => s + i.price, 0) };
            try {
                await fetch(`${API_URL}/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
            } catch {}
            cart = [];
            updateCartUI();
            toggleCart();
            showSuccess();
        }

        function showSuccess() {
            document.getElementById('main-content').innerHTML = `
                <div class="success-screen">
                    <h2>✓ Pedido confirmado!</h2>
                    <p>Obrigado pela sua compra. Você receberá um e-mail de confirmação.</p>
                    <button class="btn-back" onclick="location.reload()">Continuar comprando</button>
                </div>
            `;
        }

        updateCartUI();
        initBackend();
        fetchProducts();
    </script>
</body>
</html>
